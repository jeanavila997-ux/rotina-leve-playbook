        - heading "O Sistema de Recompensa e a Atenção" [level=3] [ref=e1254]
        - paragraph [ref=e1255]: "A atenção do cérebro é governada por duas redes principais: a \"rede de modo padrão\" (quando divagamos) e a \"rede de controle executivo\" (quando estamos focados). Para a rede de controle executivo funcionar, ela precisa inibir as distrações, o que gasta muita energia (glicose). Por outro lado, estímulos como redes sociais oferecem recompensas imediatas (dopamina) com zero esforço. O cérebro, sempre buscando economizar energia e maximizar prazer, naturalmente prefere o estímulo fácil, abandonando o trabalho que exige esforço cognitivo."
