        - 'heading "A Solução: Bloqueio de Tempo e Presença" [level=3] [ref=e1205]'
        - paragraph [ref=e1206]: A chave para não se sobrecarregar não é fazer tudo ao mesmo tempo, mas fazer uma coisa de cada vez com presença total.
