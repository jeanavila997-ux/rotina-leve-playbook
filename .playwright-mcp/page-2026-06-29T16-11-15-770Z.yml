            - text: "Não tente focar por duas horas seguidas. Use a técnica Pomodoro ou similar: 25 minutos de foco total, seguidos por 5 minutos de descanso de verdade (sem telas). Isso dá ao cérebro o tempo necessário para recuperar a energia."
