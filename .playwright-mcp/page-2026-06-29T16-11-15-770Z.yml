      - generic [ref=e1325]:
        - generic [ref=e1326]: O Resumo
        - heading "Resumo" [level=3] [ref=e1327]
        - paragraph [ref=e1328]: Um ambiente desorganizado aumenta a carga cognitiva do seu cérebro, esgotando a sua energia mental e gerando estresse e procrastinação, mesmo antes de começar a trabalhar. Organizar o espaço e usar a arquitetura de escolhas é reduzir o atrito e fazer com que o seu ambiente trabalhe a favor da sua produtividade, e não contra ela.
      - generic [ref=e1329]:
        - generic [ref=e1330]: O Próximo Passo
        - heading "O que vem a seguir?" [level=3] [ref=e1331]
        - paragraph [ref=e1332]: Com um ambiente melhor, você começa com mais energia. Mas por que, mesmo assim, parece tão difícil ir até o fim de um projeto? No próximo capítulo, vamos descobrir como quebrar o doloroso ciclo de começar várias coisas e não terminar nenhuma.
    - article [ref=e1333]:
      - generic [ref=e1334]:
        - generic [ref=e1335]: Capítulo 24 / 31
        - heading "24. Como evitar o ciclo de começar tudo e terminar nada" [level=2] [ref=e1336]
      - generic [ref=e1339]: Atrito → Leveza
      - generic [ref=e1341]:
        - generic [ref=e1342]: Texto
        - heading "O Cemitério de Projetos Inacabados" [level=3] [ref=e1343]
        - paragraph [ref=e1344]:
          - text: Você teve uma ideia brilhante. Compro o curso, pesquisou as ferramentas, fez um cronograma lindo no papel e começou com força total. Uma semana depois, a empolgação diminuiu. Duas semanas depois, surgiu um obstáculo chato. Um mês depois, o projeto já estava esquecido em alguma pasta do computador, e você já estava empolgado com uma
          - emphasis [ref=e1345]: nova
          - text: ideia brilhante. O seu armário e o seu disco rígido são verdadeiros cemitérios de projetos iniciados e abandonados.
      - generic [ref=e1346]:
        - generic [ref=e1347]: A Dor
        - heading "A Dor da Frustração Contínua" [level=3] [ref=e1348]
        - paragraph [ref=e1349]: "A cada novo projeto que fica pelo caminho, a sua autoconfiança sofre um golpe. Começa a surgir uma voz interna dizendo: \"Por que eu sou assim? Eu nunca termino nada. Eu sou um fracasso\". Essa repetição cria a crença de que você não tem disciplina ou capacidade de conclusão. A euforia inicial sempre termina em culpa, e a longo prazo, você passa a duvidar de qualquer nova iniciativa que tenta começar, paralisando a sua evolução."
      - generic [ref=e1350]:
        - generic [ref=e1351]: A Causa
        - heading "Por que amamos começar e odiamos terminar?" [level=3] [ref=e1352]
        - paragraph [ref=e1353]: "Começar algo novo é cercado de fantasia e perfeição. Quando você imagina um projeto, você foca nos resultados finais, no sucesso, no \"eu ideal\". Quando chega a hora da execução, a realidade bate à porta: o processo é tedioso, difícil, confuso e cheio de pequenas falhas. Ao menor sinal de dificuldade, o projeto perde o brilho, e a mente rapidamente busca uma nova ideia brilhante para recomeçar o ciclo de fantasia."
      - generic [ref=e1354]:
        - generic [ref=e1355]: Texto
        - heading "A Dopamina da Novidade vs. A Construção" [level=3] [ref=e1356]
        - paragraph [ref=e1357]: O cérebro é viciado em novidade. Começar um projeto novo gera um pico enorme de dopamina, o neurotransmissor da motivação e do desejo. Você se sente vivo e energizado. No entanto, o "meio" do projeto, a fase da execução consistente, não oferece esses picos de dopamina. Essa fase requer esforço sustentado e tolerância à frustração. O cérebro interpreta essa falta de dopamina como um sinal para abandonar o barco e procurar a próxima "novidade brilhante".
      - generic [ref=e1358]:
        - generic [ref=e1359]: A Solução
        - 'heading "A Solução: Escopo Mínimo e Foco no Processo" [level=3] [ref=e1360]'
        - paragraph [ref=e1361]: Para parar de abandonar projetos, você precisa reduzir as expectativas iniciais e mudar a forma como mede o seu sucesso.
        - list [ref=e1362]:
          - listitem [ref=e1363]:
            - strong [ref=e1364]: "Diminua o Escopo:"
            - text: Não tente escrever um livro, escreva um artigo. Não tente criar um negócio milionário, tente conseguir o seu primeiro cliente. Reduza o tamanho do projeto para algo que pode ser concluído em algumas semanas, não anos.
          - listitem [ref=e1365]:
            - strong [ref=e1366]: "Apaixone-se pelo Processo, Não pelo Resultado:"
            - text: Aceite que a fase intermediária será tediosa e difícil. Não busque picos de euforia diários; busque a satisfação de "fazer o que precisava ser feito hoje".
          - listitem [ref=e1367]:
            - strong [ref=e1368]: "A Regra de \"Terminar Antes de Começar\":"
            - text: "Crie a regra inflexível: você só tem permissão para começar um projeto novo se finalizar o atual ou decidir conscientemente abortá-lo (assumindo que ele não faz mais sentido, e não apenas por estar cansado)."
      - generic [ref=e1369]:
