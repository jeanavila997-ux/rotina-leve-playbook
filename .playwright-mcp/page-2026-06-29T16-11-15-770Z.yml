        - paragraph [ref=e1304]: Crescemos focados em melhorar nós mesmos — nossas habilidades, nossa disciplina, nossa força de vontade. Esquecemos que o comportamento humano é altamente dependente do contexto. Se você colocar um excelente cozinheiro em uma cozinha suja, sem os ingredientes e com facas cegas, ele não fará um bom prato. O ambiente molda as nossas decisões, facilitando ou dificultando os hábitos que queremos construir.
