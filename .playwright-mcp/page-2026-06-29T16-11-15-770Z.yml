        - paragraph [ref=e533]:
          - text: Para focar em tarefas de baixa dopamina, você precisa associá-las a recompensas imediatas ou a estímulos prazerosos (técnica conhecida como
          - emphasis [ref=e534]: temptation bundling
          - text: ou empacotamento de tentação). Se você não consegue motivar seu cérebro com a recompensa abstrata do futuro, traga uma microrecompensa para o presente. Além disso, criar um sistema visual de progresso (como riscar tarefas com caneta colorida) dá ao cérebro uma dose física de dopamina por missão cumprida.
