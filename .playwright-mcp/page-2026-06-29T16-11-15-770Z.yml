        - paragraph [ref=e729]: A nossa mente tem uma enorme dificuldade em calcular o impacto de ações no futuro em comparação com o alívio imediato no presente. Adiar a tarefa hoje parece uma decisão racional porque nos poupa de um desconforto imediato. No entanto, nós ignoramos o fato de que a ansiedade acumulada durante o período de espera é muito maior e mais dolorosa do que o esforço necessário para resolver a tarefa logo de início.
