        - heading "Por que perdemos o foco tão rápido?" [level=3] [ref=e1250]
        - paragraph [ref=e1251]: Muitas vezes, culpamos a falta de força de vontade, mas a verdade é que o seu cérebro está travando uma batalha injusta. Vivemos em um ambiente desenhado por milhares de engenheiros e psicólogos cujo único objetivo é capturar a sua atenção e mantê-la presa. Notificações, cores vibrantes, novidades constantes — tudo é otimizado para sequestrar o seu foco.
      - generic [ref=e1252]:
