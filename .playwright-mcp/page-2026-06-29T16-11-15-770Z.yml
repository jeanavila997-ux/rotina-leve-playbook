            - strong [ref=e1209]: "A Regra dos Blocos de Foco:"
            - text: "Divida o seu dia em blocos temáticos. Por exemplo: Manhã para trabalho, início da noite para estudos. Durante o bloco de trabalho, não pense nos estudos. Durante os estudos, esqueça o trabalho."
          - listitem [ref=e1210]:
            - strong [ref=e1211]: "Prioridades por Temporada:"
            - text: Aceite que em algumas semanas o trabalho exigirá mais de você, e em outras, os estudos ou a família. Não tente equilibrar o dia; tente equilibrar a semana ou o mês.
