        - heading "O Cérebro e a Carga Cognitiva Visual" [level=3] [ref=e1307]
        - paragraph [ref=e1308]: Nosso cérebro processa informações visuais constantemente, mesmo que você não esteja prestando atenção de forma consciente. Quando você está em um ambiente desorganizado, o seu cérebro precisa gastar energia para filtrar estímulos irrelevantes (a pilha de papéis, a xícara suja, os fios) e manter o foco na tarefa. Isso aumenta a chamada "carga cognitiva". Com a carga cognitiva alta, a sua energia mental se esgota mais rápido, o nível de cortisol (hormônio do estresse) sobe e o córtex pré-frontal, responsável pelo foco, perde a eficiência.
