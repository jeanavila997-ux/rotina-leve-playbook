        - heading "O Malabarismo da Vida Moderna" [level=3] [ref=e1189]
        - paragraph [ref=e1190]: Você acorda cedo para trabalhar, tenta encaixar uma hora de estudo no horário de almoço, volta para casa exausto, e ainda precisa cuidar da casa, da família e de si mesmo. No fim do dia, a sensação é de que você fez malabarismo com várias bolas de vidro e deixou a maioria delas cair. A culpa por não conseguir dar conta de tudo ao mesmo tempo é constante. A vida parece uma lista de tarefas infinita onde você está sempre atrasado.
      - generic [ref=e1191]:
        - generic [ref=e1192]: A Dor
        - heading "A Dor da Desconexão e da Sobrecarga" [level=3] [ref=e1193]
        - paragraph [ref=e1194]: Tentar equilibrar perfeitamente trabalho, estudos e vida pessoal gera uma sobrecarga imensa. Quando você está trabalhando, sente culpa por não estar com a família. Quando está descansando, sente culpa por não estar estudando. Essa falta de presença faz com que você nunca aproveite o momento e viva em um estado crônico de estresse. O resultado é o esgotamento, e a sensação de que não importa o quanto você se esforce, nunca será suficiente.
      - generic [ref=e1195]:
