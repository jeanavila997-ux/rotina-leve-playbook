        - heading "Por Que Isso Acontece?" [level=3] [ref=e573]
        - paragraph [ref=e574]:
          - text: A sociedade moderna nos convenceu de que o
          - emphasis [ref=e575]: multitasking
          - text: (multitarefa) é uma habilidade valiosa. Isso é uma mentira biológica. O cérebro humano é incapaz de focar em duas tarefas complexas ao mesmo tempo. O que chamamos de multitarefa é, na verdade, o cérebro alternando de foco rapidamente entre uma tarefa e outra. Essa alternância constante consome uma quantidade imensa de energia celular, gerando fadiga e um estado crônico de estresse de baixa intensidade.
