        - heading "Resumo" [level=3] [ref=e1226]
        - paragraph [ref=e1227]: Tentar equilibrar trabalho, estudos e vida pessoal perfeitamente todos os dias é o caminho para a exaustão. As constantes trocas de contexto drenam a energia do cérebro. A solução é usar blocos de tempo temáticos e estar 100% presente no bloco atual, aceitando que o equilíbrio se constrói no longo prazo, não em um único dia perfeito.
