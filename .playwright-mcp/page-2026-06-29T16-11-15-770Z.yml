        - heading "O Mito do Equilíbrio Perfeito" [level=3] [ref=e1197]
        - paragraph [ref=e1198]: A ideia de que podemos dividir o nosso dia em fatias perfeitamente iguais de produtividade e lazer é uma ilusão. A vida não é estática; ela é feita de fases e picos de demanda. A tentativa de manter tudo em perfeito equilíbrio o tempo todo é exatamente o que causa a sobrecarga, pois exige um nível de controle irreal sobre imprevistos e variações de energia.
      - generic [ref=e1199]:
        - generic [ref=e1200]: O Cérebro
        - heading "O Cérebro e a Troca de Contexto" [level=3] [ref=e1201]
        - paragraph [ref=e1202]: Nosso cérebro não é multitarefa; ele apenas alterna rapidamente entre diferentes focos, um processo chamado "troca de contexto" (context switching). Cada vez que você pula do modo "trabalho" para o modo "estudos" ou "vida pessoal", o seu cérebro gasta energia para se adaptar às novas regras e expectativas. Fazer muitas trocas ao longo do dia esgota a sua energia mental, reduz a sua capacidade de concentração e aumenta a sensação de cansaço no final do dia.
        - text: caderno de campo
