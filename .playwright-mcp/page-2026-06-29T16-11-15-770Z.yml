        - heading "O Cenário Real" [level=3] [ref=e668]
        - paragraph [ref=e669]: "Você visita a casa ou o escritório de um amigo. Tudo está no lugar: as chaves ficam sempre no mesmo gancho na entrada, a mesa tem apenas o computador e uma agenda organizada, e a pessoa sabe exatamente o que vai fazer nas próximas três horas. Você suspira e pensa: \"Como eu queria ter esse dom. Eu nasci bagunçado e nunca vou conseguir ser assim\". Você volta para a sua casa, onde as chaves somem dia sim, dia não, e a sua lista de tarefas está rabiscada em três papéis diferentes que você provavelmente vai perder."
      - generic [ref=e670]:
        - generic [ref=e671]: A Dor
        - heading "A Dor" [level=3] [ref=e672]
        - paragraph [ref=e673]: A dor de se sentir "naturalmente desorganizado" é a sensação de incompetência constante. Você compra agendas caras, planners coloridos e aplicativos de produtividade de última geração, mas depois de três dias de uso, eles acabam esquecidos em uma gaveta. Isso reforça a crença de que você não tem o "talento" da organização, gerando uma resignação de que você está condenado a viver no caos para sempre.
      - generic [ref=e674]:
        - generic [ref=e675]: A Causa
        - heading "Por Que Isso Acontece?" [level=3] [ref=e676]
        - paragraph [ref=e677]:
          - text: A organização não é um traço de personalidade ou um talento de nascença; ela é apenas um
          - strong [ref=e678]: sistema lógico de processos
          - text: . Os planners e aplicativos que você comprou falharam não porque você é incorrigível, mas porque esses sistemas eram complexos demais para o seu nível de energia atual. Um bom sistema de organização deve se adaptar a você, e não o contrário. Se o sistema exige que você seja uma pessoa diferente para funcionar, ele está quebrado na origem.
