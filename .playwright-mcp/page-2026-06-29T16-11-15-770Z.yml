        - heading "Por que isso acontece?" [level=3] [ref=e1549]
        - paragraph [ref=e1550]: A motivação é uma emoção, e emoções são instáveis. Ela é alimentada por novidade, expectativa e recompensa rápida. Quando a novidade acaba, a motivação cai. O problema é que a gente aprendeu a esperar por ela antes de agir. Espera-se sentir vontade para começar. Mas na vida real, a maioria das ações importantes começa sem vontade nenhuma — e a vontade aparece depois, como resultado do movimento.
      - generic [ref=e1551]:
        - generic [ref=e1552]: O Cérebro
        - heading "O Cérebro e o Circuito da Recompensa" [level=3] [ref=e1553]
        - paragraph [ref=e1554]: A dopamina é o neurotransmissor da recompensa e da expectativa. No início de uma nova rotina, a dopamina flui forte porque tudo é novo. Com o tempo, o cérebro se adapta e a recompensa diminui. Isso é normal e esperado. Para manter a constância, você não pode depender só da dopamina da novidade. Precisa criar gatilhos externos e recompensas pequenas — como marcar um check, fazer uma pausa prazerosa ou dizer "pronto" em voz alta — que mantenham o circuito ativo mesmo nos dias em que o entusiasmo natural sumiu.
