        - paragraph [ref=e1174]: O ciclo de "tudo ou nada" destrói a constância porque esgota a energia do seu cérebro. Para criar hábitos duradouros, você precisa trocar a intensidade pela repetição. O método da Rotina Leve foca em definir e cumprir o seu "Mínimo Viável", tornando a mudança tão fácil que o seu cérebro não consegue resistir.
