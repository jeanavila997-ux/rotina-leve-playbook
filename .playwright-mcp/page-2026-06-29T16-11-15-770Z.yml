      - generic [ref=e622]:
        - generic [ref=e623]: A Causa
        - heading "Por Que Isso Acontece?" [level=3] [ref=e624]
        - paragraph [ref=e625]: O erro está na magnitude da mudança que você tenta impor. O cérebro humano é programado pela evolução para economizar energia e manter a estabilidade (homeostase). Quando você tenta mudar sua rotina de forma drástica de um dia para o outro, seu cérebro interpreta essa mudança abrupta como uma ameaça ao seu equilíbrio interno e ativa uma forte resistência psicológica. Mudanças grandes exigem muita energia; mudanças minúsculas passam despercebidas pelo "alarme" do cérebro.
