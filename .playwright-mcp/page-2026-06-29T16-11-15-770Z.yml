          - strong [ref=e580]: Tálamo
          - text: ", que funciona como um \"porteiro\" decidindo o que deve ser enviado para a nossa consciência. Em ambientes com excesso de estímulos, o tálamo fica sobrecarregado e perde a capacidade de filtrar o que é ruído e o que é sinal. Além disso, nossa"
          - strong [ref=e581]: Memória de Trabalho
          - text: (a mesa de trabalho temporária do cérebro) tem capacidade para gerenciar apenas cerca de quatro informações simultaneamente. Quando você joga dezenas de estímulos nela, ela transborda, causando esquecimentos e confusão mental.
        - text: caderno de campo
      - generic [ref=e582]:
        - generic [ref=e583]: A Solução
        - 'heading "Solução Prática: A Dieta Sensorial" [level=3] [ref=e584]'
        - paragraph [ref=e585]:
          - text: Para restaurar a capacidade do tálamo e liberar a memória de trabalho, você precisa adotar a política do
          - strong [ref=e586]: estímulo único
          - text: ". Durante seus blocos de foco, limpe os canais sensoriais: uma única tela, uma única aba aberta no navegador, nenhuma notificação ativa e, se precisar de som, escolha ruído branco ou músicas instrumentais repetitivas (como Lo-Fi ou música clássica), que não exigem processamento de linguagem pelo cérebro."
