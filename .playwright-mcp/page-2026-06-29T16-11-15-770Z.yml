      - generic [ref=e508]:
        - generic [ref=e509]: O Cenário
        - heading "O Cenário Real" [level=3] [ref=e510]
        - paragraph [ref=e511]: "Você tem uma tarefa administrativa entediante para fazer, como preencher planilhas ou declarar impostos. Você adia essa tarefa por semanas porque a simples ideia de começar parece dolorosa. No entanto, quando um amigo te chama para jogar um videogame novo ou quando você decide assistir a uma série de suspense, você consegue passar cinco horas seguidas focado, sem sentir fome ou sono. Você se pergunta: \"Como posso ter tanta capacidade de foco para o lazer e nenhuma para o que realmente importa?\"."
      - generic [ref=e512]:
        - generic [ref=e513]: A Dor
        - heading "A Dor" [level=3] [ref=e514]
        - paragraph [ref=e515]:
          - text: Essa inconsistência na sua capacidade de concentração gera sentimentos de culpa e impostura. Você começa a acreditar que é uma pessoa imatura, que só faz o que quer e que não tem maturidade para lidar com as responsabilidades da vida adulta. A discrepância entre o que você
          - emphasis [ref=e516]: pode
          - text: fazer sob estímulo e o que você
          - emphasis [ref=e517]: consegue
          - text: fazer no tédio é confusa e dolorosa.
