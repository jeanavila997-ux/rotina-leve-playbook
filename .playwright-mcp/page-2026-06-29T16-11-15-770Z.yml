        - generic [ref=e519]: A Causa
        - heading "Por Que Isso Acontece?" [level=3] [ref=e520]
        - paragraph [ref=e521]:
          - text: O cérebro não escolhe o que fazer com base na importância lógica da tarefa. Ele decide com base na
          - strong [ref=e522]: economia de dopamina
          - text: . A dopamina não é o neurotransmissor do prazer (o que você sente quando come um chocolate), mas o neurotransmissor do
          - strong [ref=e523]: desejo
          - text: e da
          - strong [ref=e524]: busca
          - text: (o que você sente antes de comer o chocolate). Se o cérebro antecipa que uma tarefa trará recompensa rápida e garantida, ele libera dopamina e você ganha foco instantâneo. Se a tarefa promete recompensa incerta e distante (como estudar para um concurso), a dopamina cai e o cérebro resiste à ação.
      - generic [ref=e525]:
        - generic [ref=e526]: O Cérebro
