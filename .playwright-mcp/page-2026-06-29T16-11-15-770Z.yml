        - heading "O Ciclo do Excesso de Esforço" [level=3] [ref=e1137]
        - paragraph [ref=e1138]: Você já começou uma segunda-feira decidido a mudar de vida? Acordou mais cedo, fez exercícios intensos, comeu perfeitamente, trabalhou focado por horas e, no fim do dia, sentiu que finalmente tinha "entrado nos eixos". Mas, na quarta-feira, você já estava exausto. Na quinta, pulou o treino. Na sexta, pediu um delivery e passou a noite no sofá, sentindo que havia falhado novamente. O ciclo recomeça, sempre baseado em fazer muito esforço de uma vez só, para depois desistir por cansaço.
      - generic [ref=e1139]:
        - generic [ref=e1140]: A Dor
        - heading "A Dor da Inconstância" [level=3] [ref=e1141]
        - paragraph [ref=e1142]: "A sensação de ser uma pessoa de \"tudo ou nada\" é frustrante. Quando você está motivado, consegue fazer tudo. Quando a motivação acaba, tudo desmorona. Isso cria uma crença de que você não tem disciplina ou força de vontade suficiente. A verdade é que o problema não está em você, mas na estratégia que está utilizando: tentar mudar tudo de uma vez com o máximo de esforço possível."
      - generic [ref=e1143]:
