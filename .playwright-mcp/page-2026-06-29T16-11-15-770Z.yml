        - heading "Caminho para o Próximo Capítulo" [level=3] [ref=e498]
        - paragraph [ref=e499]: Ao desarmar as distrações visuais e digitais do seu ambiente, você dá um descanso para a sua atenção. Mas o que fazer com a urgência química interna que o cérebro sente para buscar novidades e estímulos o tempo todo? No próximo capítulo, vamos decifrar o papel da dopamina e entender como usar essa substância biológica a favor da sua produtividade.
    - article [ref=e500]:
      - generic [ref=e501]:
        - generic [ref=e502]: Capítulo 08 / 31
        - 'heading "Capítulo 8: Seu cérebro busca dopamina o tempo todo: aprenda a usar isso a seu favor" [level=2] [ref=e503]'
