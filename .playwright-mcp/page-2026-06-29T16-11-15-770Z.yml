        - heading "Por que tentamos abraçar o mundo?" [level=3] [ref=e1145]
        - paragraph [ref=e1146]: A sociedade nos ensina que o sucesso exige sacrifício extremo. Vemos influenciadores e gurus de produtividade mostrando rotinas complexas e exaustivas. Acreditamos que, se não estivermos sofrendo ou nos esforçando ao máximo, não estamos progredindo. Esse perfeccionismo faz com que, diante de um pequeno deslize, a gente jogue tudo para o alto. Se não posso fazer a rotina perfeita, então não vou fazer nada.
      - generic [ref=e1147]:
