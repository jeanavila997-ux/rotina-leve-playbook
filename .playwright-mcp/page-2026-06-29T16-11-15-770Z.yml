        - paragraph [ref=e1546]: "Depender da motivação é como depender do sol: em alguns dias ele simplesmente não aparece. Quando a motivação some, você se sente perdido, sem força para começar e com a sensação de que tudo o que construiu é frágil. A culpa vem em seguida: \"se eu realmente quisesse, eu faria\". Mas querer e sentir vontade são coisas diferentes. Querer é uma escolha. Vontade é um estado emocional que varia."
