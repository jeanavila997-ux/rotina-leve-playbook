        - heading "A Dor de Ser Escravo das Distrações" [level=3] [ref=e1246]
        - paragraph [ref=e1247]: A sensação é de que você perdeu o controle sobre a sua própria mente. É frustrante querer fazer algo produtivo e não conseguir focar por mais de cinco minutos. Parece que os outros têm um superpoder que lhe falta. A falta de atenção prejudica o seu trabalho, atrasa os seus projetos e faz com que você gaste muito mais tempo do que o necessário para concluir tarefas simples, sugando o seu tempo livre.
      - generic [ref=e1248]:
