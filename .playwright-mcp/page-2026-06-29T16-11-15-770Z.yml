        - heading "O Cenário Real" [level=3] [ref=e565]
        - paragraph [ref=e566]: "Você está trabalhando. No computador, há dois monitores ligados: um com o seu relatório principal, outro com a caixa de e-mails aberta e o chat da empresa piscando. No celular ao lado, uma notificação de entrega de aplicativo surge. Nos fones de ouvido, toca uma música animada. Para completar, você tem uma xícara de café pela metade e está pensando no que vai cozinhar no jantar. Você sente que está \"no fluxo\" por estar fazendo muitas coisas ao mesmo tempo. Porém, ao final do dia, você percebe que não terminou o relatório, está com uma dor de cabeça tensional e a sua mente parece uma sopa de pensamentos desconexos."
      - generic [ref=e567]:
        - generic [ref=e568]: A Dor
        - heading "A Dor" [level=3] [ref=e569]
        - paragraph [ref=e570]: A dor da hiperestimulação é a sensação de estar sempre "acelerado", mas sem sair do lugar. Você sente uma névoa mental constante, irritabilidade com pequenos ruídos e uma incapacidade de se fazer presente em qualquer conversa ou atividade. Mesmo quando tenta descansar, deitando na cama à noite, sua mente continua correndo em alta velocidade, impedindo que você durma de forma regeneradora.
      - generic [ref=e571]:
