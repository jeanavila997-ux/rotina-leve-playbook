        - heading "O Cérebro e a Economia de Energia" [level=3] [ref=e1149]
        - paragraph [ref=e1150]: Nosso cérebro evoluiu para ser uma máquina de economia de energia. Qualquer mudança drástica na rotina é interpretada como uma ameaça aos recursos do corpo (glicose e energia mental). Quando você tenta implementar muitos hábitos difíceis ao mesmo tempo, o cérebro ativa mecanismos de resistência, gerando a sensação de cansaço extremo e a vontade incontrolável de voltar aos velhos e confortáveis hábitos (o "tudo ou nada"). Para criar constância, precisamos enganar o cérebro, fazendo mudanças tão pequenas que ele não perceba como uma ameaça.
