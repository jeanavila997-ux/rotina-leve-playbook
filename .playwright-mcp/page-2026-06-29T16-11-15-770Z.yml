        - paragraph [ref=e528]:
          - text: Toda a nossa motivação passa pela
          - strong [ref=e529]: Via Mesolímbica
          - text: ", o circuito de recompensa do cérebro. Quando o cérebro avalia uma tarefa, ele faz um cálculo inconsciente de custo-benefício. Tarefas digitais modernas (redes sociais, jogos) inundam essa via com descargas de dopamina constantes e fáceis. O cérebro, então, eleva sua \"linha de base\" de dopamina. Ao comparar o estímulo de um feed infinito com o tédio de um livro técnico, a leitura é avaliada como deficitária e o cérebro bloqueia a energia necessária para iniciá-la."
