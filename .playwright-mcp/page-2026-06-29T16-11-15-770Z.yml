        - paragraph [ref=e617]: "Você decide que precisa melhorar sua saúde e sua produtividade. No domingo à noite, você faz planos grandiosos: vai malhar na academia seis vezes por semana durante uma hora e meia, beber quatro litros de água por dia e ler um livro por semana. Na segunda e na terça, você segue o plano com muito esforço. Na quarta, você acorda com dores musculares, tem um dia estressante no trabalho e decide pular a academia \"só hoje\". Na quinta, você também não vai. No domingo seguinte, você percebe que abandonou o plano completamente e se sente frustrado por não ter \"força de vontade\"."
