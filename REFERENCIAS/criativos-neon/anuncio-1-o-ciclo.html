<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDAH Descomplicado — Anúncio 1: O Ciclo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=STIX+Two+Text:ital,wght@0,400;0,700;0,900&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon-primary: #4F46E5;
    --neon-secondary: #0EA5E9;
    --neon-accent: #F43F5E;
    --neon-purple: #818CF8;
    --neon-surface: #FFFFFF;
    --neon-text: #1E293B;
    --neon-dark: #FAFBFD;
  }

  body {
    background: #E2E8F0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 40px;
    font-family: 'Roboto', sans-serif;
  }

  .label {
    font-family: 'Source Code Pro', monospace;
    font-size: 14px;
    color: #64748B;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .ad {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: var(--neon-dark);
    color: var(--neon-text);
    box-shadow: 0 10px 40px rgba(79, 70, 229, 0.08);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px;
  }

  .glow-1 {
    position: absolute;
    top: -180px;
    right: -180px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.08), transparent 70%);
    filter: blur(70px);
  }

  .glow-2 {
    position: absolute;
    bottom: -200px;
    left: -200px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(14, 165, 233, 0.06), transparent 70%);
    filter: blur(70px);
  }

  .topo {
    position: relative;
    z-index: 2;
    text-align: center;
    width: 100%;
    flex: 0 0 30%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .headline {
    font-family: 'STIX Two Text', serif;
    font-size: 68px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--neon-primary);
  }

  .meio {
    position: relative;
    z-index: 2;
    flex: 0 0 40%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loop-box {
    position: relative;
    width: 520px;
    height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loop-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 20px rgba(79, 70, 229, 0.15));
  }

  .icon-float {
    position: absolute;
    font-size: 42px;
    opacity: 0.55;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05));
  }

  .icon-1 { top: 20px; left: 30px; }
  .icon-2 { top: 60px; right: 40px; }
  .icon-3 { bottom: 40px; left: 60px; }
  .icon-4 { bottom: 20px; right: 80px; }
  .icon-5 { top: 140px; left: 0px; }
  .icon-6 { top: 120px; right: 10px; }

  .baixo {
    position: relative;
    z-index: 2;
    flex: 0 0 30%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    gap: 30px;
    text-align: center;
  }

  .subheadline {
    font-size: 34px;
    font-weight: 400;
    color: rgba(30, 41, 59, 0.8);
    line-height: 1.4;
  }

  .subheadline strong {
    color: var(--neon-text);
    font-weight: 700;
  }

  .cta-button {
    padding: 26px 60px;
    background: var(--neon-primary);
    color: var(--neon-surface);
    font-family: 'STIX Two Text', serif;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-radius: 18px;
    box-shadow: 0 8px 30px rgba(79, 70, 229, 0.3);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .social-proof {
    font-family: 'Source Code Pro', monospace;
    font-size: 18px;
    color: rgba(30, 41, 59, 0.6);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stars {
    color: #FFD700;
    font-size: 20px;
  }

  @media print {
    body { background: white; padding: 0; }
    .label { display: none; }
    .ad { border-radius: 0; box-shadow: none; page-break-after: always; }
  }
</style>
</head>
<body>

<div class="label">ANÚNCIO 1 · O CICLO · 1080x1350px · Meta Ads / Instagram</div>

<div class="ad">
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="topo">
    <h1 class="headline">Você já sentou pra trabalhar e 2 horas depois estava organizando uma pasta que não precisava?</h1>
  </div>

  <div class="meio">
    <div class="loop-box">
      <svg class="loop-svg" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="loopGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#0EA5E9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
          </linearGradient>
        </defs>
        <path d="M 80 100 C 80 40, 160 40, 200 100 C 240 160, 320 160, 320 100 C 320 40, 240 40, 200 100 C 160 160, 80 160, 80 100 Z"
              fill="none" stroke="url(#loopGrad)" stroke-width="8" stroke-linecap="round" />
        <circle cx="80" cy="100" r="10" fill="#B026FF" />
        <circle cx="320" cy="100" r="10" fill="#B026FF" />
      </svg>
      <div class="icon-float icon-1">📱</div>
      <div class="icon-float icon-2">💬</div>
      <div class="icon-float icon-3">🔔</div>
      <div class="icon-float icon-4">📧</div>
      <div class="icon-float icon-5">🗂️</div>
      <div class="icon-float icon-6">⏰</div>
    </div>
  </div>

  <div class="baixo">
    <p class="subheadline">Não é falta de vontade.<br><strong>É TDAH.</strong></p>
    <div class="cta-button">
      Descubra como quebrar o ciclo
      <span>→</span>
    </div>
    <div class="social-proof">
      <span class="stars">★★★★★</span>
      <span>4.9 · 12.847 pessoas já transformaram sua rotina</span>
    </div>
  </div>
</div>

</body>
</html>
